<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/83da9facc2.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="Estilo/cadastro.css">
</head>
<body>
    <main>
        <video src="Assets/fundoAnimado.mp4" autoplay muted loop></video>

        <div class="container">
            <div class="entrar_container">
                <span id="span_nome">Nome</span>
                <span id="span_email">Email</span>
                <span id="span_senha">Senha</span>
                <span id="span_confirmar_senha">Confirmar Senha</span>

                <h2>Já tem uma conta?</h2>
                <p>Acesse a sua conta agora</p>
                <a href="index.html">Entrar</a>
            </div>
            <div class="formulario">
                <h1>CRIE A SUA CONTA</h1>
                <form action="POST">
                    <label for="">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Nome Completo" name="nome" required>
                    </label>
                    <label for="">
                        <i class="fa fa-envelope" aria-hidden="true"></i>
                        <input type="email" placeholder="Email" name="email" required>
                    </label>

                    <label for="">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Senha" name="senha" required>
                    </label>

                    <label for="">
                        <button type="submit" name="cadastrar">Cadastrar</button>
                    </label>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
